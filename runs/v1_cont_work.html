<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>v1_cont_work — Mutator Run</title>
<style>/* base design system — extracted from mutator_report/index.html, extended for the showcase */
:root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --ink:#e6edf3; --muted:#9aa7b4;
    --line:#2a323d; --accent:#5aa9ff; --good:#3fb950; --bad:#f85149; --warn:#d29922;
    --glm:#a371f7; --opus:#f0883e; --code:#0b0f14;
    --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;font-size:15px}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:1060px;margin:0 auto;padding:0 22px}
  header.hero{padding:50px 0 28px;border-bottom:1px solid var(--line)}
  .kicker{color:var(--accent);font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:12px}
  h1{font-size:30px;line-height:1.18;margin:8px 0 12px;letter-spacing:-.01em}
  h2{font-size:23px;margin:46px 0 6px;letter-spacing:-.01em}
  h3{font-size:17px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:15.5px;max-width:800px}
  .summary{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:10px;padding:18px 22px;margin:24px 0}
  .summary p{margin:.5em 0}
  .summary .head{font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);font-weight:700;margin-bottom:4px}
  nav.toc{display:flex;flex-wrap:wrap;gap:8px;margin:22px 0 6px}
  nav.toc a{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:13px;color:var(--muted)}
  nav.toc a:hover{color:#fff;border-color:var(--accent)}
  .muted{color:var(--muted)}
  .legend{display:flex;gap:18px;flex-wrap:wrap;align-items:center;margin:14px 0 0;font-size:12.5px;color:var(--muted)}
  .legend .pill{font-size:11px}
  .grid{display:grid;gap:16px}
  @media(min-width:760px){.cols-2{grid-template-columns:1fr 1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
  .pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;vertical-align:middle}
  .pill.glm{background:rgba(163,113,247,.16);color:#c8a8ff;border:1px solid rgba(163,113,247,.4)}
  .pill.opus{background:rgba(240,136,62,.16);color:#ffb27a;border:1px solid rgba(240,136,62,.4)}
  .pill.up{background:rgba(63,185,80,.16);color:#6ee787;border:1px solid rgba(63,185,80,.4)}
  .pill.bad{background:rgba(248,81,73,.16);color:#ff9a93;border:1px solid rgba(248,81,73,.4)}
  .pill.null{background:rgba(210,153,34,.14);color:#e3b341;border:1px solid rgba(210,153,34,.4)}
  .pill.dn{background:rgba(248,81,73,.10);color:#ff9a93;border:1px solid rgba(248,81,73,.3)}
  .setup{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 20px;margin:16px 0}
  .setup dl{display:grid;grid-template-columns:max-content 1fr;gap:7px 16px;margin:6px 0 0;font-size:13.5px}
  .setup dt{color:#c8d3de;font-weight:600;font-family:var(--mono);font-size:12px;padding-top:1px}
  .setup dd{margin:0;color:var(--muted)}
  .setup dd b{color:var(--ink)}
  .note{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:13px 18px;margin:16px 0;font-size:13.5px;color:var(--muted)}
  .note b{color:var(--ink)}
  .iter{border:1px solid var(--line);border-radius:12px;margin:16px 0;overflow:hidden}
  .iter .head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:var(--panel2);flex-wrap:wrap}
  .iter .head .t{font-weight:600;font-size:16px}
  .iter .body{padding:16px 18px;display:grid;gap:14px}
  @media(min-width:780px){.iter .body{grid-template-columns:1.18fr .82fr}}
  .lbl{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  code,pre{font-family:var(--mono);font-size:12.5px}
  pre{background:var(--code);border:1px solid var(--line);border-radius:8px;padding:12px 14px;overflow:auto;color:#cdd9e5;margin:8px 0}
  pre .c{color:#8b98a5}
  details{background:var(--code);border:1px solid var(--line);border-radius:8px;margin:8px 0}
  details summary{cursor:pointer;padding:9px 13px;color:var(--accent);font-size:13px;font-weight:600;user-select:none}
  details[open] summary{border-bottom:1px solid var(--line)}
  details .in{padding:4px 14px 12px}
  .tree{font-family:var(--mono);font-size:12.5px;color:#cdd9e5;white-space:pre;line-height:1.5;overflow:auto}
  .tree .d{color:var(--accent)} .tree .new{color:var(--good)} .tree .cmt{color:#8b98a5}
  table{border-collapse:collapse;width:100%;font-size:13px;margin:8px 0}
  th,td{border:1px solid var(--line);padding:7px 9px;text-align:left;vertical-align:top}
  th{background:var(--panel2);color:var(--muted);font-weight:600}
  td.n{font-variant-numeric:tabular-nums;text-align:right}
  /* delta chart */
  .dc{margin:18px 0 6px;border:1px solid var(--line);border-radius:12px;padding:16px 18px;background:var(--panel)}
  .dc-cap{font-size:13px;color:var(--muted);margin:0 0 12px}
  .dc-cap b{color:var(--ink)}
  .dc-ticks{position:relative;height:14px;margin:0 0 4px}
  .dc-ticks span{position:absolute;transform:translateX(-50%);font-size:10px;color:var(--muted)}
  .dc-row{margin:11px 0}
  .dc-name{font-size:12.5px;color:var(--ink);margin-bottom:4px}
  .dc-name .mut{color:var(--muted)}
  .dc-track{position:relative;height:22px;background:#0b0f14;border-radius:5px;border:1px solid var(--line)}
  .dc-band{position:absolute;top:0;bottom:0;background:rgba(210,153,34,.20);border-left:1px dashed rgba(210,153,34,.55);border-right:1px dashed rgba(210,153,34,.55)}
  .dc-zero{position:absolute;top:-3px;bottom:-3px;width:2px;background:#6b7682}
  .dc-bar{position:absolute;top:3px;bottom:3px;border-radius:3px}
  .dc-val{position:absolute;top:3px;font-size:11px;font-weight:700;line-height:16px}
  .dc-foot{font-size:11.5px;color:var(--muted);margin-top:12px;border-top:1px solid var(--line);padding-top:9px}
  .obs{display:flex;gap:14px;padding:15px 0;border-bottom:1px solid var(--line)}
  .obs .num{font-size:22px;font-weight:700;color:var(--accent);min-width:28px;line-height:1.2}
  .obs h3{margin:0 0 4px;font-size:16px}
  .tl{position:relative;margin:14px 0 6px;padding-left:22px}
  .tl::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--line)}
  .tl .step{position:relative;margin:0 0 16px}
  .tl .step::before{content:"";position:absolute;left:-19px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--bg)}
  .tag{font-family:var(--mono);font-size:11px;color:var(--muted)}
  footer{color:var(--muted);font-size:13px;padding:34px 0 60px;border-top:1px solid var(--line);margin-top:40px}
  .src{border-left:3px solid var(--line);padding:2px 0 2px 14px;color:var(--muted);margin:10px 0;font-size:13px}
  .flow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0 2px}
  @media(max-width:560px){.flow{grid-template-columns:repeat(2,1fr)}}
  .flow .b{background:var(--code);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:12.5px;position:relative}
  .flow .b::after{content:"→";position:absolute;right:-9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
  .flow .b:nth-child(4)::after{content:""}
  @media(max-width:560px){.flow .b:nth-child(2)::after{content:""}}
  .flow .b b{color:var(--ink);font-size:12.5px}
  .flow .b span{color:var(--muted)}

/* run.css — per-run page components (extends base.css) */
.rhero{padding:34px 0 24px;border-bottom:1px solid var(--line)}
.back{font-size:13px;color:var(--muted);display:inline-block;margin-bottom:14px}
.back:hover{color:var(--accent)}
.rhero h1{display:flex;align-items:center;gap:11px;flex-wrap:wrap;font-size:27px}
.rheadline{color:#cdd9e5;font-size:14.5px;max-width:880px;line-height:1.55;margin:8px 0 0}
.effort{font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
.loading{padding:60px 0;color:var(--muted);text-align:center}
section{margin:40px 0 10px}
.diffspin,.fsv-empty,.drill-empty{color:var(--muted);font-size:13px;padding:14px;font-style:italic}
.nodiff{color:var(--muted);font-size:13px;padding:11px 13px;background:var(--code);border:1px dashed var(--line);border-radius:8px}
.warnchip{color:#ffb27a;font-size:11px;border:1px solid rgba(240,136,62,.4);border-radius:5px;padding:0 6px}

/* ---- iteration timeline ---- */
.itblock{border:1px solid var(--line);border-radius:12px;margin:14px 0;overflow:hidden;background:var(--panel)}
.itblock.bare{opacity:.85}
.itb-head{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--panel2);border-bottom:1px solid var(--line);flex-wrap:wrap}
.itn{flex:0 0 28px;height:28px;border-radius:50%;background:var(--code);border:1px solid var(--line);color:var(--accent);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;font-family:var(--mono)}
.itb-t{font-weight:600;font-size:15.5px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.itb-nums{margin-left:auto;display:inline-flex;gap:11px;align-items:center;flex-wrap:wrap}
.inum{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}.inum b{color:var(--ink)}
.itb-did{padding:12px 16px 4px;font-size:13.5px;color:#cdd9e5;line-height:1.55}
.itb-did b{color:#fff}.itb-did code{background:var(--code);padding:0 4px;border-radius:4px;color:#cdd9e5}
.itb-change{padding:4px 16px 12px;font-size:12px;color:var(--muted)}
.itb-change .ck{font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-right:7px;color:var(--muted)}
.itb-change code{color:#9db4cc}
.chip{font-family:var(--mono);font-size:11px;border-radius:4px;padding:0 5px;margin:0 1px}
.chip.add{color:#6ee787;background:rgba(63,185,80,.13)}.chip.del{color:#ff9a93;background:rgba(248,81,73,.13)}
.itb-diffs{padding:0 16px 12px;display:grid;gap:7px}
.diffbox{margin:0;background:var(--code)}
.diffbox summary{display:flex;align-items:center;gap:10px;padding:8px 12px;font-family:var(--mono);font-size:12.5px;color:#cdd9e5}
.diffbox summary .dfile{color:var(--accent)} .dstat{margin-left:auto}
.diffbody{padding:0}
.diff{font-family:var(--mono);font-size:12px;line-height:1.5;overflow-x:auto;max-height:520px;overflow-y:auto;border-top:1px solid var(--line)}
.dl{white-space:pre;padding:0 10px}
.dl .sgn{display:inline-block;width:14px;color:var(--muted);user-select:none}
.dl.add{background:rgba(63,185,80,.10);color:#caf2d0}.dl.add .sgn{color:#3fb950}
.dl.del{background:rgba(248,81,73,.10);color:#ffd2cf}.dl.del .sgn{color:#f85149}
.dl.ctx{color:#8b98a5}
.dl.hunk{color:#6b7682;background:#0b0f14;font-style:italic;padding:3px 10px}

/* ---- tabs ---- */
.tabbar{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0 0}
.tab{background:var(--panel2);border:1px solid var(--line);border-radius:8px 8px 0 0;padding:8px 14px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.tab.on{background:var(--panel);color:var(--ink);border-bottom-color:var(--panel)}
.tab:hover{color:var(--ink)}
.tcount{font-weight:400;font-size:11px;color:var(--muted);font-family:var(--mono)}

/* ---- mutator trajectory ---- */
.trajholder{border:1px solid var(--line);border-radius:0 10px 10px 10px;padding:16px;background:var(--panel)}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px;margin-bottom:12px}
.tile{background:var(--code);border:1px solid var(--line);border-radius:9px;padding:9px 11px;text-align:center}
.tile .tv{font-size:17px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1.15}
.tile .tl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
.tile.exp .tv{color:var(--accent)}.tile.gate .tv{color:#7ee787}.tile.ok .tv{color:#6ee787}
.tile.warn .tv{color:#ffb27a}.tile.muted .tv{color:var(--muted)}
.trajnote{font-size:12.5px;color:var(--muted);margin:0 0 12px;padding:9px 13px;background:var(--panel2);border:1px solid var(--line);border-radius:8px}
.trajnote b{color:var(--ink)}
.trajtl{max-height:640px;overflow-y:auto;padding-right:8px;border:1px solid var(--line);border-radius:9px;background:#0b0f14;padding:14px 14px 14px 18px}
.trajtl::-webkit-scrollbar{width:10px}.trajtl::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
.tprompt{background:var(--code);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:10px 13px;margin:0 0 14px}
.tp-h{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:5px}
.tp-b{margin:0;font-size:12px;max-height:160px;overflow:auto;color:#9db4cc;border:0;background:transparent;padding:0}
.tsteps{position:relative;padding-left:20px}
.tsteps::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--line)}
.tstep{position:relative;margin:0 0 12px}
.tstep::before{content:"";position:absolute;left:-19px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--line);box-shadow:0 0 0 3px var(--panel)}
.t-text{font-size:13px;color:#cdd9e5;line-height:1.5;margin-bottom:6px;white-space:pre-wrap}
.t-call{background:var(--code);border:1px solid var(--line);border-radius:8px;padding:8px 11px}
.t-call.run_harvey_agent{border-left:3px solid var(--accent)}
.t-call.dev_eval{border-left:3px solid var(--good)}
.t-call.proxy_eval{border-left:3px solid var(--warn)}
.t-call.wrote{border-left:3px solid var(--glm)}
.t-call.task{border-left:3px solid var(--opus)}
.t-tool{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);background:rgba(90,169,255,.12);border-radius:4px;padding:1px 6px;margin-right:6px}
.t-tool.wrote{color:#c8a8ff;background:rgba(163,113,247,.14)}.t-tool.task{color:#ffb27a;background:rgba(240,136,62,.14)}
.t-desc{font-size:12px;color:var(--muted)}
.btag{font-family:var(--mono);font-size:10px;font-weight:700;border-radius:4px;padding:1px 6px;margin-right:6px;text-transform:uppercase;letter-spacing:.03em}
.btag.run_harvey_agent{color:#9cc7ff;background:rgba(90,169,255,.16)}
.btag.dev_eval{color:#7ee787;background:rgba(63,185,80,.16)}
.btag.proxy_eval{color:#e3b341;background:rgba(210,153,34,.16)}
.btag.budget,.btag.check_runaway,.btag.cost_rank{color:var(--muted);background:var(--panel2)}
.t-cmd{margin:6px 0 0;font-size:11.5px;max-height:130px;overflow:auto}
.t-res{margin:6px 0 0;background:#0b0f14}
.t-res summary{font-size:11.5px;padding:5px 9px;color:var(--muted)}
.t-res pre{margin:0;max-height:240px;font-size:11px}
.t-res pre.del{background:rgba(248,81,73,.08)}.t-res pre.add{background:rgba(63,185,80,.08)}
.lessons{margin:18px 0 0;border-top:1px solid var(--line);padding-top:14px}
.lz-h{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--glm);margin-bottom:8px}
.lz-h code{background:var(--code);padding:0 4px;border-radius:4px;color:#c8a8ff}
.lesson{background:var(--code);border-left:3px solid var(--glm)}
.lesson summary{color:#c8a8ff;font-family:var(--mono);font-size:12px}
.lz-b{padding:4px 14px 12px;font-size:13px}
.finalmsg{margin:14px 0 0;background:var(--code)}
.finalmsg summary{color:var(--accent);font-size:12.5px}
.fm-b{padding:6px 14px 12px;font-size:13px}

/* ---- helps vs harms ---- */
.hhsum{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin:6px 0 14px;font-size:13px}
.hh-c{padding:4px 11px;border-radius:8px;border:1px solid var(--line);color:var(--muted)}
.hh-c b{font-size:15px;margin-right:4px}
.hh-c.good{color:#7ee787;border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.07)}
.hh-c.bad{color:#ff9a93;border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.07)}
.hh-c.warn{color:#e3b341;border-color:rgba(210,153,34,.4);background:rgba(210,153,34,.07)}
.hh-net{margin-left:auto;color:var(--muted)}.hh-net b{color:var(--ink)}
.valpool{border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:11px;background:var(--panel);padding:13px 16px;margin:0 0 16px}
.vp-h{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:5px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.vp-h b{color:#fff}
.vp-tag{font-size:10.5px;font-weight:600;color:var(--accent);border:1px solid rgba(90,169,255,.4);background:rgba(90,169,255,.1);border-radius:999px;padding:1px 8px;text-transform:none}
.vp-note{font-size:12.5px;color:var(--muted);margin-bottom:11px;line-height:1.5}.vp-note b{color:#cdd9e5}
.vp-bar{display:flex;align-items:center;gap:10px;margin:4px 0}
.vp-bar.bare{opacity:.7}
.vp-i{flex:0 0 92px;font-size:11px;color:var(--muted);font-family:var(--mono)}
.vp-track{flex:1;height:15px;background:#0b0f14;border:1px solid var(--line);border-radius:4px;overflow:hidden}
.vp-fill{height:100%;border-radius:0}
.vp-v{flex:0 0 168px;font-size:11.5px;text-align:right;font-variant-numeric:tabular-nums;color:#cdd9e5}
.vp-best{font-size:9.5px;font-weight:700;color:#6ee787;border:1px solid rgba(63,185,80,.4);background:rgba(63,185,80,.12);border-radius:999px;padding:0 6px;margin-left:5px;text-transform:uppercase;letter-spacing:.03em}
.vp-of{font-size:9.5px;font-weight:700;color:#e3b341;border:1px solid rgba(210,153,34,.4);background:rgba(210,153,34,.12);border-radius:999px;padding:0 6px;margin-left:4px;text-transform:uppercase;letter-spacing:.03em}
.hhchart{border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:var(--panel)}
.hh-axis{position:relative;height:14px;margin-bottom:6px}
.hh-axis span{position:absolute;transform:translateX(-50%);font-size:10px;color:var(--muted)}
.hh-row{display:flex;align-items:center;gap:10px;margin:3px 0;border-radius:5px;padding:1px 2px}
.hh-row:hover{background:var(--panel2)}
.hh-name{flex:0 0 230px;font-size:11.5px;color:#cdd9e5;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hh-track{position:relative;flex:1;height:18px;background:#0b0f14;border-radius:4px;border:1px solid var(--line)}
.hh-band{position:absolute;top:0;bottom:0;background:rgba(210,153,34,.16);border-left:1px dashed rgba(210,153,34,.5);border-right:1px dashed rgba(210,153,34,.5)}
.hh-zero{position:absolute;top:-2px;bottom:-2px;width:2px;background:#6b7682}
.hh-bar{position:absolute;top:2px;bottom:2px;border-radius:3px;opacity:.92}
.hh-val{position:absolute;top:2px;font-size:10.5px;font-weight:700;line-height:14px;font-variant-numeric:tabular-nums}
@media(max-width:680px){.hh-name{flex-basis:120px}}
/* drill-down */
.drill{margin:14px 0 0;border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:0}
.drill-empty{padding:18px}
.drill-h{padding:12px 16px;font-family:var(--mono);font-size:13px;color:var(--accent);background:var(--panel2);border-bottom:1px solid var(--line);border-radius:12px 12px 0 0}
.drill-grid{display:grid;gap:16px;padding:14px 16px}
@media(min-width:720px){.drill-grid{grid-template-columns:1fr 1fr}}

<script>/* run.js — per-run page app. Renders from the inlined index; lazy-loads detail. */
(function () {
"use strict";
var BOOT = JSON.parse(document.getElementById("bootstrap").textContent);
var RUN = BOOT.run, IX = BOOT.index, NARR = BOOT.iter_narr, NOISE = IX.noise || 0.013;
var DATADIR = "../../data/" + RUN + "/";        // page lives in site/runs/, data in data/
var _cache = {};                                  // path -> Promise(json)

function fetchJSON(rel) {
  if (_cache[rel]) return _cache[rel];
  _cache[rel] = fetch(DATADIR + rel).then(function (r) {
    if (!r.ok) throw new Error(rel + " " + r.status);
    return r.json();
  });
  return _cache[rel];
}
function el(tag, cls, html) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html != null) e.innerHTML = html;
  return e;
}
function esc(s) {
  return ("" + (s == null ? "" : s)).replace(/[&<>"]/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
  });
}
function fmt(x, n) { return x == null ? "—" : (+x).toFixed(n == null ? 3 : n); }
function pct(x, n) { return x == null ? "—" : (x >= 0 ? "+" : "") + (x * 100).toFixed(n == null ? 1 : n) + "%"; }
function shortTask(t) { var p = ("" + t).split("/"); return p[p.length - 1]; }
function commas(n) { return n == null ? "—" : (+n).toLocaleString("en-US"); }
function tokM(n) { return n == null ? "—" : (n / 1e6).toFixed(2) + "M"; }

var STATUS_PILL = {
  "committed": ["up", "committed"],
  "committed (no-op)": ["null", "committed · no change"],
  "committed · OVERFIT": ["null", "committed · overfit"],
  "not committed": ["dn", "reverted"],
  "aborted": ["bad", "canary-aborted"],
  "failed": ["bad", "crashed"],
  "baseline": ["", "baseline"],
  "trial": ["null", "trial"]
};
function statusPill(s) {
  var m = STATUS_PILL[s] || ["", s || ""];
  return '<span class="pill ' + m[0] + '">' + esc(m[1]) + "</span>";
}

/* ---------------------------------------------------------------- header */
function renderHeader() {
  var m = BOOT.meta;
  document.getElementById("hd-name").innerHTML =
    esc(m.name) + ' <span class="pill ' + m.mutator_pill + '">' + esc(m.mutator) + "</span>" +
    (m.effort && m.effort !== "—" ? ' <span class="effort">' + esc(m.effort) + "</span>" : "");
  document.getElementById("hd-headline").innerHTML = m.headline;
  var s = BOOT.setup, dl = "";
  [["objective", s.objective], ["budget", s.budget], ["loop", s.extras]].forEach(function (kv) {
    if (kv[1]) dl += "<dt>" + esc(kv[0]) + "</dt><dd>" + kv[1] + "</dd>";
  });
  document.getElementById("hd-setup").innerHTML =
    '<div class="setup"><dl>' + dl + "</dl></div>";
  var indep = IX.family === "v0_aggregate" || IX.family === "v0_single";
  var nav = [["timeline", indep ? "The trials" : "Iteration timeline"], ["traj", "Mutator trajectory"]];
  if (IX.helps_harms) nav.push(["helps", "Helps vs harms"]);
  var cost = IX.cost || {};
  if ((cost.per_iter || []).length || Object.keys(cost.roll_tokens || {}).length) nav.push(["cost", "Cost"]);
  nav.push(["fs", "Filesystem"]);
  if (Object.keys((IX.rollouts || {}).index || {}).length) nav.push(["rollouts", "Task rollouts"]);
  document.getElementById("hd-nav").innerHTML = nav.map(function (n) {
    return '<a href="#sec-' + n[0] + '">' + n[1] + "</a>";
  }).join("");
}

/* ---------------------------------------------------------------- score helpers */
function seriesMap() {
  var out = {};
  if (!IX.series) return out;
  (IX.series.train || []).forEach(function (r) { (out[r.iter] = out[r.iter] || {}).train = r.combined_score; });
  (IX.series.val || []).forEach(function (r) { (out[r.iter] = out[r.iter] || {}).val = r.combined_score; });
  return out;
}
function deltaPill(d) {
  if (d == null) return "";
  if (d > NOISE) return '<span class="pill up">▲ ' + pct(d) + "</span>";
  if (d < -NOISE) return '<span class="pill bad">▼ ' + pct(d) + "</span>";
  return '<span class="pill null">≈ ' + pct(d) + " (noise)</span>";
}

/* ================================================================ SECTION 1: timeline + diff */
function sectionTimeline(root) {
  var sec = el("section"); sec.id = "sec-timeline";
  var indep = IX.family === "v0_aggregate" || IX.family === "v0_single";
  sec.appendChild(el("h2", null, indep ? "The trials" : "Iteration timeline"));
  sec.appendChild(el("p", "sub", indep ?
    "Each trial is an <b>independent</b> single-shot mutator run (no continuity, no inner eval): it reads the " +
    "failure evidence, makes one generic edit to the skill, writes a lesson, and stops. The diff below is each " +
    "trial's skill vs the empty bare stub. Open a diff to inspect it." :
    "Each iteration: what the mutator changed in the harness, the held-out scores, and the exact code diff " +
    "vs the previous iteration (iter&nbsp;1 is diffed against the bare template). Open a diff to inspect it."));

  var sm = seriesMap(), bareV = sm[0] ? sm[0].val : null;
  // bare row
  if (sm[0]) {
    var b = el("div", "itblock bare");
    b.innerHTML = '<div class="itb-head"><div class="itn">0</div>' +
      '<div class="itb-t">bare harness <span class="pill" style="color:var(--muted);border:1px solid var(--line)">baseline</span></div>' +
      '<div class="itb-nums">' + scoreNums(0, sm, bareV) + "</div></div>" +
      '<div class="itb-did">The unmodified Harvey harness — the baseline every iteration is scored against.</div>';
    sec.appendChild(b);
  }

  IX.iters.forEach(function (it) {
    var n = it.n, nar = NARR[n] || {}, blk = el("div", "itblock");
    var pillS = nar.status ? statusPill(nar.status) : "";
    blk.innerHTML =
      '<div class="itb-head"><div class="itn">' + n + "</div>" +
      '<div class="itb-t">' + esc(nar.label || ("iter " + n)) + " " + pillS + "</div>" +
      '<div class="itb-nums">' + scoreNums(n, sm, bareV) + "</div></div>" +
      (nar.did ? '<div class="itb-did">' + nar.did + "</div>" : "") +
      changeLine(it, nar);
    // diff holder
    var diffWrap = el("div", "itb-diffs");
    if (it.diff_summary && it.diff_summary.length) {
      it.diff_summary.forEach(function (ds, i) {
        diffWrap.appendChild(diffToggle(n, ds, i));
      });
    } else {
      diffWrap.appendChild(el("div", "nodiff",
        "No harness file changed this iteration — byte-identical to the previous iter " +
        "(the mutator tested an edit, found it a non-improvement, and committed nothing)."));
    }
    blk.appendChild(diffWrap);
    sec.appendChild(blk);
  });
  root.appendChild(sec);
}
function scoreNums(n, sm, bareV) {
  var r = sm[n];
  if (!r) return "";
  var d = (r.val != null && bareV != null && n > 0) ? r.val - bareV : null;
  var s = "";
  if (r.train != null) s += '<span class="inum">train <b>' + fmt(r.train) + "</b></span>";
  if (r.val != null) s += '<span class="inum">val <b>' + fmt(r.val) + "</b></span>";
  s += deltaPill(d);
  return s;
}
function changeLine(it, nar) {
  var files = (it.reward.files_changed || []).map(function (f) { return f.split("/").slice(-2).join("/"); });
  var added = (it.reward.files_added || []).filter(function (f) { return f.indexOf("__pycache__") < 0; });
  var lessons = it.reward.n_lessons || 0;
  var bits = [];
  if (it.diff_summary && it.diff_summary.length) {
    var na = 0, nd = 0; it.diff_summary.forEach(function (d) { na += d.added; nd += d.removed; });
    bits.push('<span class="chip add">+' + na + "</span><span class=\"chip del\">−" + nd + "</span> across " +
      it.diff_summary.map(function (d) { return "<code>" + esc(d.file) + "</code>"; }).join(", "));
  }
  if (lessons) bits.push(lessons + " lesson" + (lessons > 1 ? "s" : "") + " written");
  if (it.reward.exit_status && it.reward.exit_status !== "finished")
    bits.push('<span class="warnchip">exit: ' + esc(it.reward.exit_status) + "</span>");
  return '<div class="itb-change"><span class="ck">change</span>' +
    (nar.change ? "<code>" + esc(nar.change) + "</code> · " : "") + bits.join(" · ") + "</div>";
}
function diffToggle(n, ds, i) {
  var d = el("details", "diffbox");
  d.innerHTML = '<summary><span class="dfile">' + esc(ds.file) + "</span>" +
    '<span class="dstat"><span class="chip add">+' + ds.added + '</span><span class="chip del">−' + ds.removed +
    "</span></span></summary>" + '<div class="diffbody" data-iter="' + n + '" data-i="' + i + '">' +
    '<div class="diffspin">loading diff…</div></div>';
  d.addEventListener("toggle", function () {
    if (!d.open) return;
    var body = d.querySelector(".diffbody");
    if (body.dataset.loaded) return;
    body.dataset.loaded = "1";
    fetchJSON("iter" + n + ".json").then(function (det) {
      var dd = (det.diffs || [])[i];
      body.innerHTML = dd ? renderDiff(dd) : "<div class='nodiff'>diff unavailable</div>";
    }).catch(function (e) { body.innerHTML = "<div class='nodiff'>error: " + esc(e.message) + "</div>"; });
  });
  return d;
}
function renderDiff(dd) {
  var rows = (dd.hunks || []).map(function (h) {
    if (h.t === "hunk") return '<div class="dl hunk">' + esc(h.x) + "</div>";
    var sign = h.t === "add" ? "+" : h.t === "del" ? "−" : " ";
    return '<div class="dl ' + h.t + '"><span class="sgn">' + sign + "</span>" + esc(h.x) + "</div>";
  }).join("");
  return '<div class="diff">' + rows + "</div>";
}

/* ================================================================ SECTION 2: mutator trajectory */
function sectionTrajectory(root) {
  var sec = el("section"); sec.id = "sec-traj";
  sec.appendChild(el("h2", null, "Mutator trajectory"));
  sec.appendChild(el("p", "sub",
    "What the mutator actually did each iteration — its reasoning, the experiments it launched " +
    "(<code>run_harvey_agent</code> rollouts, <code>dev_eval</code> held-out gate, <code>proxy_eval</code>), and what it wrote. " +
    "Pick an iteration, then expand the timeline."));

  var bar = el("div", "tabbar");
  IX.iters.forEach(function (it, i) {
    var b = el("button", "tab" + (i === 0 ? " on" : ""), "iter " + it.n);
    b.dataset.iter = it.n;
    b.addEventListener("click", function () {
      bar.querySelectorAll(".tab").forEach(function (x) { x.classList.remove("on"); });
      b.classList.add("on"); showTraj(it.n, holder);
    });
    bar.appendChild(b);
  });
  sec.appendChild(bar);
  var holder = el("div", "trajholder");
  sec.appendChild(holder);
  root.appendChild(sec);
  showTraj(IX.iters[0].n, holder);
}
function statTile(label, val, cls) {
  return '<div class="tile ' + (cls || "") + '"><div class="tv">' + val + '</div><div class="tl">' + label + "</div></div>";
}
function showTraj(n, holder) {
  var it = IX.iters.filter(function (x) { return x.n === n; })[0];
  var st = it.traj_stats || {};
  var br = st.broker || {};
  holder.innerHTML = "";
  // headline tiles
  var tiles = el("div", "tiles");
  tiles.innerHTML =
    statTile("mutator", esc(st.model || "—"), "") +
    statTile("agent turns", commas(st.iterations), "") +
    statTile("mutator $", (st.cost != null && st.cost > 0) ? "$" + (+st.cost).toFixed(2) : "n/a", "") +
    statTile("wall", st.wall_sec != null ? (st.wall_sec / 60).toFixed(0) + " min" : "—", "") +
    statTile("run_harvey_agent", br.run_harvey_agent || 0, "exp") +
    statTile("dev_eval", br.dev_eval || 0, (br.dev_eval ? "gate" : "muted")) +
    statTile("proxy_eval", br.proxy_eval || 0, "") +
    statTile("exit", esc(st.exit_status || "—"), st.exit_status === "finished" ? "ok" : "warn");
  holder.appendChild(tiles);
  var note = el("div", "trajnote");
  if (!br.dev_eval) note.innerHTML = "⚠ This iteration ran <b>0 dev_eval</b> — it never executed the held-out commit gate.";
  else note.innerHTML = "Ran the held-out <b>dev_eval</b> gate " + br.dev_eval + "× this iteration.";
  holder.appendChild(note);

  var tl = el("div", "trajtl"); tl.innerHTML = '<div class="diffspin">loading mutator session…</div>';

/* ================================================================ SECTION 3: helps vs harms */

    "The ±" + (NOISE * 100).toFixed(1) + "% band is GLM run-to-run noise — bars inside it are not real moves. " +
    "Click a task to see its per-iteration grade trace, its per-criterion verdicts, and its rollout."));

    '<span class="hh-c good"><b>' + helped + "</b> helped</span>" +

  sec.appendChild(sumbar);

  // diverging bars

  function x(d) { return Math.max(0, Math.min(100, 50 + (d / SPAN) * 50)); }
  var chart = el("div", "hhchart");
  var band = '<div class="hh-band" style="left:' + x(-NOISE) + "%;right:" + (100 - x(NOISE)) + '%"></div>';
  chart.innerHTML = '<div class="hh-axis"><span style="left:0%">−25%</span><span style="left:25%">−12%</span>' +
    '<span style="left:50%">bare</span><span style="left:75%">+12%</span><span style="left:100%">+25%</span></div>';
  hh.tasks.forEach(function (t) {
    var d = t.delta_bare == null ? 0 : t.delta_bare;
    var col = d > NOISE ? "var(--good)" : (d < -NOISE ? "var(--bad)" : "var(--warn)");

      '<div class="hh-bar" style="left:' + lo + "%;width:" + Math.max(0.5, hi - lo) + "%;background:" + col + '"></div>' +
      '<div class="hh-val" style="left:' + (d >= 0 ? Math.min(hi + 1, 92) : Math.max(lo - 8, 1)) + "%;color:" + col + '">' +

    row.addEventListener("click", function () { openTaskDrill(t); });

  });

  // drill-down panel

}
function valPoolPanel(hh) {
  var sp = hh.splits || {}; var by = sp.val; if (!by) return null;
  var iters = Object.keys(by).sort(function (a, b) { return a - b; });
  if (!iters.length) return null;
  var sm = seriesMap();
  // prefer the val split's own iter-0 combined as bare; fall back to series.json iter0
  var bareV = (by[0] && by[0].combined != null) ? by[0].combined : (sm[0] ? sm[0].val : null);
  var p = el("div", "valpool");
  // build a small bar of combined val score per iter vs bare (iter 0 is the bare row, shown separately)
  var fs = IX.full_stats || {};
  var bestVal = (fs.best_by_val || {}).iter;
  var overfit = fs.overfit_iters || [];
  var bars = iters.filter(function (i) { return +i !== 0; }).map(function (i) {
    var c = by[i].combined;
    var d = (c != null && bareV != null) ? c - bareV : null;
    var col = d == null ? "var(--muted)" : (d > NOISE ? "var(--good)" : (d < -NOISE ? "var(--bad)" : "var(--warn)"));
    var tag = "";

      '<div class="vp-v">' + (c != null ? (c * 100).toFixed(1) + "%" : "—") + (d != null ? ' <span style="color:' + col + '">' + pct(d) + "</span>" : "") + " " + tag + "</div></div>";
  }).join("");
  var bareBar = bareV != null ?
    '<div class="vp-bar bare"><div class="vp-i">iter 0 · bare</div><div class="vp-track"><div class="vp-fill" style="width:' +
    (bareV * 100).toFixed(0) + '%;background:#6b7682"></div></div><div class="vp-v">' + (bareV * 100).toFixed(1) + "%</div></div>" : "";
  p.innerHTML =
    '<div class="vp-h">Held-out <b>val</b> pool — the real generalization verdict <span class="vp-tag">disjoint 30 tasks the mutator never sees</span></div>' +
    '<div class="vp-note">The chart above is the <b>train</b> pool. <b>val is a separate, non-overlapping task set</b> — ' +

/* ================================================================ SECTION 3b: cost */
function sectionCost(root) {
  var cost = IX.cost || {};
  var per = cost.per_iter || [], rt = cost.roll_tokens || {};
  if (!per.length && !Object.keys(rt).length) return;
  var sec = el("section"); sec.id = "sec-cost";
  sec.appendChild(el("h2", null, "Cost — search spend & rollout tokens"));
  sec.appendChild(el("p", "sub",
    "How much money the mutator spent <i>searching</i> each iteration " +
    "(its <code>run_harvey_agent</code> experiments + held-out <code>dev_eval</code> gate, from the broker ledger); " +
    "the mean input-token cost of the Harvey agent's rollouts per iteration — the thing an efficiency " +
    "run is trying to cut (one rollout per task = noisy; the committed number is the dev gate); and the recovered " +
    "<b>held-out val</b> input-token cost, which <b>confirms</b> the cut the run committed on dev."));
  var grid = el("div", "costgrid");
  // left: mutator search spend
  if (per.length) {
    var maxsp = Math.max.apply(null, per.map(function (p) { return p.spent || 0; })) || 1;
    var rows = per.map(function (p) {
      var bs = p.by_source || {};
      var seg = function (k, col) {
        var v = bs[k] || 0; if (!v) return "";
        return '<div class="cseg" style="width:' + (v / maxsp * 100) + "%;background:" + col + '" title="' + k + " $" + v.toFixed(0) + '"></div>';
      };
      // n_dev counts dev_eval ROLLOUT EVENTS in the broker ledger, NOT the dev-set size.
      // The dev SET is 30 tasks; a gate pass = 30 rollouts, so n_dev=60 means the gate ran
      // twice in the iteration (on different candidate configs). Label it so the 30-task
      // dev set is never mistaken for a 60-item set.
      var nd = p.n_dev || 0;
      var passes = nd ? Math.round(nd / 30) : 0;
      var devTxt = nd ? (passes > 1 ? (passes + "× dev gate (30 tasks)") : "1× dev gate (30 tasks)")
                      : "0 dev gate";
      return '<div class="crow"><div class="ci">iter ' + p.iter + "</div>" +
        '<div class="cbar">' + seg("run_harvey_agent", "var(--accent)") + seg("dev_eval", "var(--good)") + seg("proxy_eval", "var(--warn)") + "</div>" +
        '<div class="cv">$' + (p.spent || 0).toFixed(0) + ' <span class="cexp" title="' + nd + ' dev_eval rollout events = 30-task dev gate × ' + (passes || 0) + '">' + (p.n_experiments || 0) + " exp · " + devTxt + "</span></div></div>";
    }).join("");
    grid.appendChild(el("div", "costcard",
      '<div class="cc-h">mutator search spend / iter</div>' +
      '<div class="clegend"><span class="cl"><i style="background:var(--accent)"></i>run_harvey_agent</span>' +
      '<span class="cl"><i style="background:var(--good)"></i>dev_eval</span><span class="cl"><i style="background:var(--warn)"></i>proxy_eval</span></div>' +
      rows));
  }
  // right: rollout input-token trend
  var ritems = Object.keys(rt).map(Number).sort(function (a, b) { return a - b; });
  if (ritems.length) {
    var bare = rt[0] ? rt[0].mean_input : null;
    var maxtok = Math.max.apply(null, ritems.map(function (i) { return rt[i].mean_input; }));
    var rows2 = ritems.map(function (i) {
      var v = rt[i].mean_input, d = (bare ? (v - bare) / bare : null);
      var col = i === 0 ? "#6b7682" : (d < -NOISE ? "var(--good)" : (d > NOISE ? "var(--bad)" : "var(--warn)"));
      return '<div class="crow"><div class="ci">iter ' + i + (i === 0 ? " · bare" : "") + "</div>" +
        '<div class="cbar"><div class="cseg" style="width:' + (v / maxtok * 100) + "%;background:" + col + '"></div></div>' +
        '<div class="cv">' + (v / 1e6).toFixed(2) + "M" + (d != null && i > 0 ? ' <span style="color:' + col + '">' + pct(d) + "</span>" : "") + "</div></div>";
    }).join("");
    grid.appendChild(el("div", "costcard",

      var w = bv ? Math.max(2, Math.min(100, iv / bv * 100)) : 0;
      return '<div class="crow"><div class="ci">' + lbl + "</div>" +

      '<div class="cc-h">held-out <b>val</b> input tokens vs bare <span class="cc-sub">confirms · ' + n + " tasks</span></div>" +
      '<div class="clegend"><span class="cl"><i style="background:var(--good)"></i>iter4 (argument-eviction)</span>' +
      '<span class="cl"><i style="background:#6b7682"></i>bare ' + tokM(vbare.mean) + " mean</span></div>" +
      vrow("mean", it4.mean, vbare.mean, vd.mean_pct) +

}

    var tree = el("div", "fstree");
    var view = el("div", "fsview");
    view.innerHTML = '<div class="fsv-empty">Select a file from the tree.</div>';
    grid.appendChild(tree); grid.appendChild(view);
    holder.appendChild(grid);
    if (det.fs_tree) renderTree(det.fs_tree, tree, view, "");
    else tree.innerHTML = "<div class='nodiff'>no filesystem captured</div>";
  }).catch(function (e) { holder.innerHTML = "<div class='nodiff'>error: " + esc(e.message) + "</div>"; });
}
function renderTree(node, container, view, path) {
  var ul = el("ul", "ftree");
  (node.children || []).forEach(function (ch) { addNode(ch, ul, view, path); });
  container.innerHTML = "";
  container.appendChild(ul);
}
function addNode(node, ul, view, parent) {
  var li = el("li");
  var p = parent + "/" + node.name;
  if (node.type === "dir") {
    var hdr = el("div", "fdir", '<span class="caret">▸</span> ' + esc(node.name) +
      ' <span class="fcount">' + countFiles(node) + "</span>");
    var kids = el("ul", "ftree nested");
    (node.children || []).forEach(function (ch) { addNode(ch, kids, view, p); });
    var open = (node.name === "harness" || node.name === ".claude" || node.name === "memory" || node.name === "tools");
    if (!open) kids.style.display = "none";
    if (open) hdr.querySelector(".caret").textContent = "▾";
    hdr.addEventListener("click", function () {
      var vis = kids.style.display !== "none";
      kids.style.display = vis ? "none" : "block";
      hdr.querySelector(".caret").textContent = vis ? "▸" : "▾";
    });
    li.appendChild(hdr); li.appendChild(kids);
  } else {
    var f = el("div", "ffile", esc(node.name) + ' <span class="fsize">' + (node.size / 1024).toFixed(1) + "K</span>");
    f.addEventListener("click", function () {
      ul.closest(".fstree").querySelectorAll(".ffile.on").forEach(function (x) { x.classList.remove("on"); });
      f.classList.add("on");
      showFile(node, p, view);
    });
    li.appendChild(f);
  }
  ul.appendChild(li);
}
function countFiles(node) {
  var n = 0;
  (function rec(x) { (x.children || []).forEach(function (c) { if (c.type === "file") n++; else rec(c); }); })(node);
  return n;
}
function showFile(node, path, view) {
  if (node.body == null) {
    view.innerHTML = '<div class="fsv-h">' + esc(path) + '</div><div class="fsv-big">Binary or large file (' +
      (node.size / 1024).toFixed(1) + " KB) — not inlined.</div>";
    return;
  }
  var body;
  if (node.lang === "md") body = '<div class="fsv-md">' + mdLite(node.body) + "</div>";
  else body = '<pre class="fsv-code lang-' + node.lang + '">' + esc(node.body) + "</pre>";
  view.innerHTML = '<div class="fsv-h">' + esc(path) + ' <span class="fsv-meta">' + (node.size / 1024).toFixed(1) + "K · " + node.lang + "</span></div>" + body;
}

/* ================================================================ SECTION 5: rollouts (global) */
function sectionRollouts(root) {
  var sec = el("section"); sec.id = "sec-rollouts";
  sec.appendChild(el("h2", null, "Harvey task rollouts"));
  var idx = IX.rollouts.index || {};
  var tasks = Object.keys(idx).sort();
  if (!tasks.length) {
    sec.appendChild(el("p", "sub", "No harvested task rollouts for this run (v0 trials did not harvest per-task trajectories)."));
    root.appendChild(sec); return;
  }
  sec.appendChild(el("p", "sub",
    "Every harvested Harvey-agent rollout: the turns, tool calls, token cost, ensemble grade, and the deliverable " +
    "memo it produced — for each task × iteration. Loaded on demand (there are " +
    tasks.reduce(function (a, t) { return a + Object.keys(idx[t]).length; }, 0) + " rollouts). " +
    "Pick a task and an iteration."));
  var ctrl = el("div", "rollctrl");
  var sel = el("select", "rollsel");
  tasks.forEach(function (t) { var o = el("option"); o.value = t; o.textContent = shortTask(t); sel.appendChild(o); });
  ctrl.appendChild(sel);
  var iterbar = el("span", "rolliters");
  ctrl.appendChild(iterbar);
  sec.appendChild(ctrl);
  var view = el("div", "rollview big");
  view.innerHTML = '<div class="fsv-empty">Pick a task and iteration.</div>';
  sec.appendChild(view);
  function refreshIters() {
    var t = sel.value, its = Object.keys(idx[t]).sort(function (a, b) { return a - b; });
    iterbar.innerHTML = its.map(function (i) {
      return '<button class="rollbtn" data-key="' + esc(idx[t][i]) + '">iter ' + i + (i === "0" ? " · bare" : "") + "</button>";
    }).join("");
    iterbar.querySelectorAll(".rollbtn").forEach(function (b) {
      b.addEventListener("click", function () {
        iterbar.querySelectorAll(".rollbtn").forEach(function (x) { x.classList.remove("on"); });
        b.classList.add("on"); openRollout(b.dataset.key, view);
      });
    });
  }
  sel.addEventListener("change", refreshIters);
  refreshIters();
  root.appendChild(sec);
}
function openRollout(key, view) {
  view.innerHTML = '<div class="diffspin">loading rollout…</div>';
  fetchJSON("rollouts/" + key + ".json").then(function (r) { renderRollout(r, view); })
    .catch(function (e) { view.innerHTML = "<div class='nodiff'>error: " + esc(e.message) + "</div>"; });
}
function renderRollout(r, view) {
  var m = r.metrics || {}, g = r.grade || {};
  var head = '<div class="ro-head"><div class="ro-task">' + esc(r.task) + ' <span class="ro-iter">' + esc(r.iter) + "</span></div>" +
    '<div class="ro-tiles">' +
    statTile("ens pass-rate", g.ens_pass_rate != null ? (g.ens_pass_rate * 100).toFixed(0) + "%" : "—", g.ens_pass_rate >= 0.75 ? "ok" : (g.ens_pass_rate < 0.6 ? "warn" : "")) +
    statTile("turns", commas(m.turns), "") +
    statTile("input tok", tokM(m.input_tokens), "") +
    statTile("output tok", commas(m.output_tokens), "") +
    statTile("docs read", (m.docs_read != null ? m.docs_read : "—") + "/" + (m.docs_total != null ? m.docs_total : "—"), "") +
    statTile("failed crit", g.n_failed != null ? g.n_failed + "/" + g.n_graded : "—", g.n_failed ? "warn" : "ok") +
    "</div></div>";
  var tabs = '<div class="ro-tabs"><button class="rotab on" data-p="transcript">transcript (' + (r.turns || []).length + ")</button>" +
    '<button class="rotab" data-p="deliverable">deliverable</button>' +
    '<button class="rotab" data-p="failed">failed criteria (' + (g.n_failed || 0) + ")</button></div>";
  var delivHtml = r.deliverable
    ? '<div class="deliv-src">artifact: <code>' + esc(r.deliverable_src || "deliverable.md") + "</code> — the memo the Harvey agent wrote (graded)</div>" +
      '<div class="fsv-md">' + mdLite(r.deliverable) + "</div>"
    : "<div class='nodiff'>No markdown artifact harvested for this iter (only the binary .docx was written).</div>";
  view.innerHTML = head + tabs + '<div class="ro-pane" data-pane="transcript">' + renderTranscript(r.turns || []) + "</div>" +
    '<div class="ro-pane hide" data-pane="deliverable">' + delivHtml + "</div>" +
    '<div class="ro-pane hide" data-pane="failed">' + renderFailed(g.failed || []) + "</div>";
  view.querySelectorAll(".rotab").forEach(function (b) {
    b.addEventListener("click", function () {
      view.querySelectorAll(".rotab").forEach(function (x) { x.classList.remove("on"); });
      b.classList.add("on");
      view.querySelectorAll(".ro-pane").forEach(function (p) { p.classList.toggle("hide", p.dataset.pane !== b.dataset.p); });
    });
  });
}
function renderTranscript(turns) {
  return '<div class="trans">' + turns.map(function (t) {
    if (t.role === "system") return '<details class="tr sys"><summary>system prompt</summary><pre>' + esc(t.text) + "</pre></details>";
    if (t.role === "user") return '<div class="tr user"><div class="tr-r">task</div><pre>' + esc(t.text) + "</pre></div>";
    if (t.role === "assistant") {
      var tc = (t.tool_calls || []).map(rollAction).join("");
      var tok = (t.it != null) ? '<span class="tr-tok">' + tokM(t.it) + " in · " + commas(t.ot) + " out</span>" : "";
      return '<div class="tr asst"><div class="tr-r">assistant ' + tok + "</div>" + (t.text ? "<div class='tr-t'>" + esc(t.text) + "</div>" : "") + tc + "</div>";
    }
    if (t.role === "tool") return '<details class="tr tool"><summary>' + esc(t.name || "tool") + " result</summary><pre>" + esc(t.result) + "</pre></details>";
    return "";
  }).join("") + "</div>";
}
function rollAction(c) {
  if (c.name === "bash")
    return '<div class="ract bash"><span class="ract-n">bash</span><pre class="tr-cmd">$ ' + esc(c.cmd) + "</pre></div>";
  if (c.name === "read")
    return '<div class="ract read"><span class="ract-n">read</span> <span class="ract-f">' + esc(c.file) + "</span></div>";
  if (c.name === "write")
    return '<div class="ract write"><span class="ract-n">write</span> <span class="ract-f">' + esc(c.file) + "</span>" +
      '<details class="t-res"><summary>content</summary><pre>' + esc(c.preview) + "</pre></details></div>";
  if (c.name === "edit")
    return '<div class="ract edit"><span class="ract-n">edit</span> <span class="ract-f">' + esc(c.file) + "</span>" +
      '<details class="t-res"><summary>diff</summary><pre class="del">' + esc(c.old) + '</pre><pre class="add">' + esc(c.new) + "</pre></details></div>";
  return '<div class="ract"><span class="ract-n">' + esc(c.name) + "</span></div>";
}
function renderFailed(failed) {
  if (!failed.length) return "<div class='nodiff'>No failed criteria — all graded criteria passed.</div>";
  return '<div class="verdlist">' + failed.map(function (c) {
    return '<div class="vrow no"><span class="vbadge">FAIL</span><span class="vid">' + esc(c.id) + "</span>" +
      '<span class="vt">' + esc(c.title) + '</span><div class="vmatch">' + esc(c.match) + "</div></div>";
  }).join("") + "</div>";
}

/* ---------------------------------------------------------------- tiny markdown */
function mdLite(s) {
  if (s == null) return "";
  var lines = ("" + s).split("\n"), out = [], inCode = false, code = [];
  function flush() { if (code.length) { out.push("<pre>" + esc(code.join("\n")) + "</pre>"); code = []; } }
  for (var i = 0; i < lines.length; i++) {
    var L = lines[i];
    if (/^```/.test(L)) { if (inCode) { flush(); inCode = false; } else { inCode = true; } continue; }
    if (inCode) { code.push(L); continue; }
    if (/^#{1,6}\s/.test(L)) { var lvl = L.match(/^#+/)[0].length; out.push("<h" + Math.min(lvl + 2, 6) + ">" + inl(L.replace(/^#+\s/, "")) + "</h" + Math.min(lvl + 2, 6) + ">"); }
    else if (/^\s*[-*]\s/.test(L)) out.push("<li>" + inl(L.replace(/^\s*[-*]\s/, "")) + "</li>");
    else if (/^\s*\d+\.\s/.test(L)) out.push("<li>" + inl(L.replace(/^\s*\d+\.\s/, "")) + "</li>");
    else if (/^\s*$/.test(L)) out.push("");
    else if (/^\|.*\|/.test(L)) out.push("<div class='mdtr'>" + esc(L) + "</div>");
    else out.push("<p>" + inl(L) + "</p>");
  }
  flush();
  // wrap consecutive <li> in <ul>
  var html = out.join("\n").replace(/(<li>[\s\S]*?<\/li>)(?=\n(?!<li>)|$)/g, function (m) { return "<ul>" + m + "</ul>"; });
  return html;
  function inl(t) {
    return esc(t).replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>")
      .replace(/(?:^|[^*])\*([^*]+)\*/g, function (mm, p1) { return mm.replace("*" + p1 + "*", "<i>" + p1 + "</i>"); });
  }
}

/* ---------------------------------------------------------------- insight footer */
function sectionInsight(root) {
  if (!BOOT.insight || !BOOT.insight.length) return;
  var sec = el("section", "insightsec");
  sec.innerHTML = '<div class="ins-h">What we learned from this run</div><ul>' +
    BOOT.insight.map(function (b) { return "<li>" + b + "</li>"; }).join("") + "</ul>";
  root.appendChild(sec);
}

/* ---------------------------------------------------------------- boot */
function main() {
  renderHeader();
  var app = document.getElementById("app");
  app.innerHTML = "";
  sectionTimeline(app);
  sectionTrajectory(app);
  sectionHelps(app);
  sectionCost(app);
  sectionFS(app);
  sectionRollouts(app);
  sectionInsight(app);
  // demo deep-link: ?demo=1 auto-populates the interactive viewers (used for screenshots)
  if (/[?&]demo=1/.test(location.search)) setTimeout(demoOpen, 400);
}
function demoOpen() {
  // open the most-harmed and most-helped task drill (last item = most helped)
  var hh = IX.helps_harms;
  if (hh && hh.tasks.length) {
    openTaskDrill(hh.tasks[hh.tasks.length - 1]);
    var d = document.getElementById("hh-drill");
    if (d) {
      var vb = d.querySelector(".verdbtn"); if (vb) vb.click();
      var rb = d.querySelector(".rollbtn"); if (rb) rb.click();
    }
  }
  // open a filesystem file: agent_loop.py if present
  var ffiles = document.querySelectorAll(".fstree .ffile");
  for (var i = 0; i < ffiles.length; i++) {
    if (/agent_loop\.py/.test(ffiles[i].textContent)) { ffiles[i].click(); break; }
  }
  // open first global rollout, then its deliverable tab
  var grb = document.querySelector("#sec-rollouts .rolliters .rollbtn");
  if (grb) { grb.click(); setTimeout(function () {
    var dt = document.querySelector("#sec-rollouts .rotab[data-p='deliverable']");
    if (dt) dt.click();
  }, 300); }
  // open the first diff
  var db = document.querySelector(".diffbox"); if (db) db.open = true;
}
main();
})();
